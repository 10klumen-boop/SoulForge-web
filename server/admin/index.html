<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SoulForge · Админка</title>
  <style>
    :root {
      --bg: #0c0a07; --panel: #16110a; --panel2: #1e1710; --edge: #5a4830;
      --gold: #c9a86a; --txt: #e8dcc8; --dim: #9a8e78; --ok: #7aaa6a; --bad: #c07050;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font: 13px/1.45 "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--txt); }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 16px 14px 48px; }
    h1 { margin: 0 0 2px; font-size: 20px; color: var(--gold); }
    .sub { margin: 0 0 14px; font-size: 12px; color: var(--dim); }
    .card { background: var(--panel); border: 1px solid var(--edge); border-radius: 6px; padding: 12px 14px; margin-bottom: 12px; }
    label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--gold); margin-bottom: 4px; }
    input, select {
      padding: 7px 9px; border-radius: 3px; border: 1px solid var(--edge);
      background: #0a0805; color: var(--txt); font: inherit;
    }
    input[type="password"], input[type="search"], input[type="text"], input[type="number"], input[type="datetime-local"] {
      width: 100%; max-width: 280px;
    }
    .filters { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px 10px; align-items: end; }
    .filters .grow { grid-column: span 2; }
    .filters input, .filters select { max-width: none; width: 100%; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .row.mt { margin-top: 10px; }
    button {
      padding: 7px 12px; border-radius: 3px; border: 1px solid var(--edge);
      background: linear-gradient(180deg, #6a5530, #2a2010); color: #f2e6c8;
      font-weight: 600; font-size: 12px; cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    button.ghost { background: #1a140c; }
    button.warn { border-color: #8a4030; color: #f0d0c0; }
    button.ok { border-color: #4a6a40; color: #d0e8c0; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .msg { margin-top: 8px; font-size: 12px; color: var(--dim); }
    .msg.err { color: var(--bad); }
    .stats { display: flex; flex-wrap: wrap; gap: 8px 14px; font-size: 12px; color: var(--gold); margin: 0; }
    .stats b { color: var(--txt); font-weight: 700; }
    .tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .tab {
      padding: 8px 14px; border: 1px solid var(--edge); border-radius: 4px 4px 0 0;
      background: #120e08; color: var(--dim); font-weight: 700; font-size: 12px; cursor: pointer;
    }
    .tab.sel { background: var(--panel2); color: var(--gold); border-bottom-color: var(--panel2); }
    .table-wrap { overflow: auto; border: 1px solid var(--edge); border-radius: 4px; max-height: min(70vh, 720px); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 7px 8px; border-bottom: 1px solid rgba(255,255,255,.06); text-align: left; vertical-align: top; }
    th { background: #120e08; color: var(--gold); position: sticky; top: 0; z-index: 1; white-space: nowrap; }
    tr:hover td { background: rgba(201,168,106,.04); }
    tr.clickable { cursor: pointer; }
    td small, .muted { color: var(--dim); }
    .pill {
      display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700;
      border: 1px solid rgba(201,168,106,.35); color: var(--gold); white-space: nowrap;
    }
    .pill.evt { border-color: rgba(120,160,200,.4); color: #a8c8e0; }
    .pill.sev-critical { border-color: rgba(192,112,80,.6); color: #ffb090; background: rgba(80,24,16,.35); }
    .pill.sev-warn { border-color: rgba(201,168,106,.5); color: #e8c878; }
    .pill.sev-info { border-color: rgba(120,160,120,.4); color: #a8d0a8; }
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-bottom: 12px; }
    .dash-card { background: var(--panel2); border: 1px solid var(--edge); border-radius: 4px; padding: 10px 12px; }
    .dash-card h3 { margin: 0 0 8px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--gold); }
    .dash-card .big { font-size: 22px; font-weight: 700; color: var(--txt); line-height: 1.2; }
    .dash-card .sub { font-size: 11px; color: var(--dim); margin-top: 4px; }
    .export-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .export-row button { font-size: 11px; padding: 5px 9px; }
    .acts { display: flex; flex-wrap: wrap; gap: 4px; min-width: 120px; }
    .acts button { padding: 4px 8px; font-size: 11px; }
    .inp { width: 68px; padding: 3px 5px; }
    code, .mono { font-family: ui-monospace, Consolas, monospace; font-size: 11px; color: var(--gold); }
    .pager { display: flex; gap: 8px; align-items: center; margin-top: 10px; color: var(--dim); font-size: 12px; }
    .layout { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 1100px) {
      .layout.has-detail { grid-template-columns: 1fr 380px; }
    }
    .detail {
      background: var(--panel2); border: 1px solid var(--edge); border-radius: 6px;
      padding: 12px; position: sticky; top: 8px; max-height: calc(100vh - 24px); overflow: auto;
    }
    .detail h2 { margin: 0 0 8px; font-size: 15px; color: var(--gold); }
    .detail h3 { margin: 14px 0 6px; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); }
    .detail .close { float: right; }
    .kv { display: grid; grid-template-columns: 100px 1fr; gap: 4px 8px; font-size: 12px; }
    .kv span:first-child { color: var(--dim); }
    .payload {
      margin: 4px 0 0; padding: 6px 8px; background: #0a0805; border-radius: 3px;
      font-family: ui-monospace, Consolas, monospace; font-size: 10px; color: var(--dim);
      white-space: pre-wrap; word-break: break-word; max-height: 120px; overflow: auto;
    }
    .empty { padding: 20px; color: var(--dim); text-align: center; }
    .section[hidden], [hidden] { display: none !important; }
    .toolbar {
      position: sticky; top: 0; z-index: 20; background: rgba(12,10,7,.94);
      backdrop-filter: blur(6px); border-bottom: 1px solid var(--edge);
      margin: -16px -14px 12px; padding: 10px 14px;
    }
    .live-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--dim); margin-right: 6px; vertical-align: middle;
    }
    .live-dot.on { background: var(--ok); box-shadow: 0 0 8px rgba(122,170,106,.7); }
    .presets { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .presets button { font-size: 11px; padding: 4px 8px; }
    .presets button.sel { border-color: var(--gold); color: var(--gold); }
    .pill.ch-world { color: #d8c8a0; }
    .pill.ch-trade { color: #c9a86a; }
    .pill.ch-party { color: #8ab4e0; }
    .pill.ch-clan { color: #e0a0b8; }
    .pill.ch-whisper { color: #c0a0e0; }
    .pill.st-listed { color: #a8d0a8; }
    .pill.st-sold { color: #a8c8e0; }
    .pill.st-cancelled, .pill.st-expired { color: var(--dim); }
    .chat-body-cell { max-width: 420px; word-break: break-word; }
    .flash-new td { animation: flashRow .8s ease; }
    @keyframes flashRow { from { background: rgba(201,168,106,.22); } to { background: transparent; } }
    .updated-at { font-size: 11px; color: var(--dim); margin-left: auto; }
    .toolbar .row { justify-content: space-between; }
    label.chk { display: inline-flex; align-items: center; gap: 6px; text-transform: none; letter-spacing: 0; font-size: 12px; color: var(--txt); cursor: pointer; }
    label.chk input { width: auto; max-width: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>SoulForge · Админка</h1>
    <p class="sub">Пользователи · события · бэкапы · рейтинг · <code>SOULFORGE_ADMIN_KEY</code></p>

    <div class="card" id="gate">
      <label for="adminKey">Ключ администратора</label>
      <input type="password" id="adminKey" autocomplete="off" spellcheck="false" />
      <div class="row mt">
        <button type="button" id="unlockBtn">Войти</button>
      </div>
      <p class="msg" id="gateMsg"></p>
    </div>

    <div id="panel" hidden>
      <div class="toolbar">
        <div class="row">
          <p class="stats" id="stats" style="margin:0"></p>
          <span class="updated-at" id="updatedAt"></span>
        </div>
        <div class="row mt">
          <label class="chk"><span class="live-dot" id="liveDot"></span><input type="checkbox" id="liveToggle" checked /> Live</label>
          <select id="liveInterval" title="Интервал">
            <option value="2000">2 с</option>
            <option value="5000" selected>5 с</option>
            <option value="10000">10 с</option>
          </select>
          <button type="button" class="ghost" id="refreshBtn">Обновить</button>
          <button type="button" class="ghost" id="purgeBtn">Очистить сессии</button>
          <button type="button" id="logoutBtn">Выйти</button>
        </div>
      </div>

      <div class="tabs" id="tabs">
        <button type="button" class="tab sel" data-tab="users">Аккаунты</button>
        <button type="button" class="tab" data-tab="chat">Чат</button>
        <button type="button" class="tab" data-tab="market">Рынок</button>
        <button type="button" class="tab" data-tab="events">События</button>
        <button type="button" class="tab" data-tab="balance">Баланс</button>
        <button type="button" class="tab" data-tab="alerts">Алерты</button>
        <button type="button" class="tab" data-tab="backups">Бэкапы</button>
        <button type="button" class="tab" data-tab="scores">Рейтинг</button>
      </div>

      <div class="layout" id="layout">
        <div>
          <!-- USERS -->
          <section class="section" id="sec-users">
            <div class="card">
              <div class="filters">
                <div class="grow">
                  <label>Поиск ника</label>
                  <input type="search" id="usersQ" placeholder="nick…" />
                </div>
                <div>
                  <label>&nbsp;</label>
                  <button type="button" id="usersApply">Найти</button>
                </div>
              </div>
            </div>
            <div class="table-wrap" id="usersTable"></div>
            <div class="pager" id="usersPager"></div>
          </section>

          <!-- CHAT -->
          <section class="section" id="sec-chat" hidden>
            <div class="card">
              <div class="filters">
                <div>
                  <label>Канал</label>
                  <select id="chatChannel">
                    <option value="">Все</option>
                    <option value="world">Мир</option>
                    <option value="trade">Торговля</option>
                    <option value="party">Группа</option>
                    <option value="clan">Клан</option>
                    <option value="whisper">Шёпот</option>
                  </select>
                </div>
                <div>
                  <label>Ник</label>
                  <input type="search" id="chatNick" placeholder="nick / герой…" />
                </div>
                <div class="grow">
                  <label>Текст</label>
                  <input type="search" id="chatText" placeholder="фрагмент сообщения…" />
                </div>
                <div>
                  <label>&nbsp;</label>
                  <button type="button" id="chatApply">Фильтр</button>
                </div>
              </div>
              <div class="presets" id="chatPresets">
                <button type="button" class="ghost sel" data-ch="">Все</button>
                <button type="button" class="ghost" data-ch="world">Мир</button>
                <button type="button" class="ghost" data-ch="trade">Торг</button>
                <button type="button" class="ghost" data-ch="party">Группа</button>
                <button type="button" class="ghost" data-ch="clan">Клан</button>
                <button type="button" class="ghost" data-ch="whisper">ЛС</button>
              </div>
            </div>
            <div class="table-wrap" id="chatTable"></div>
            <div class="pager" id="chatPager"></div>
          </section>

          <!-- MARKET -->
          <section class="section" id="sec-market" hidden>
            <div class="card">
              <div class="filters">
                <div>
                  <label>Статус</label>
                  <select id="mkStatus">
                    <option value="">Все</option>
                    <option value="listed">listed</option>
                    <option value="sold">sold</option>
                    <option value="cancelled">cancelled</option>
                    <option value="expired">expired</option>
                  </select>
                </div>
                <div>
                  <label>Тип</label>
                  <select id="mkKind">
                    <option value="">Все</option>
                    <option value="weapon">weapon</option>
                    <option value="crystal">crystal</option>
                    <option value="material">material</option>
                    <option value="shot">shot</option>
                  </select>
                </div>
                <div>
                  <label>Ник</label>
                  <input type="search" id="mkNick" placeholder="продавец…" />
                </div>
                <div>
                  <label>&nbsp;</label>
                  <button type="button" id="mkApply">Фильтр</button>
                </div>
              </div>
            </div>
            <div class="table-wrap" id="marketTable"></div>
            <div class="pager" id="marketPager"></div>
          </section>

          <!-- BALANCE -->
          <section class="section" id="sec-balance" hidden>
            <div class="card">
              <div class="filters">
                <div>
                  <label>Период</label>
                  <select id="balPeriod">
                    <option value="7">7 дней</option>
                    <option value="30">30 дней</option>
                    <option value="90">90 дней</option>
                    <option value="0">Всё время</option>
                  </select>
                </div>
                <div>
                  <label>&nbsp;</label>
                  <button type="button" id="balApply">Обновить</button>
                </div>
              </div>
              <div class="export-row">
                <button type="button" class="ghost" data-csv="farm">CSV фарм</button>
                <button type="button" class="ghost" data-csv="enchant">CSV заточка</button>
                <button type="button" class="ghost" data-csv="enchant_plus">CSV +N</button>
                <button type="button" class="ghost" data-csv="quests">CSV квесты</button>
                <button type="button" class="ghost" data-csv="economy">CSV экономика</button>
                <button type="button" class="ghost" data-csv="loot">CSV лут</button>
              </div>
              <p class="msg muted" style="margin-top:8px">SQL-шаблоны: <code>server/scripts/balance-queries.sql</code></p>
            </div>
            <div class="dash-grid" id="balCards"></div>
            <div class="card"><h3 style="margin:0 0 8px;color:var(--gold);font-size:12px">Фарм по зонам</h3><div class="table-wrap" id="balFarm"></div></div>
            <div class="card"><h3 style="margin:0 0 8px;color:var(--gold);font-size:12px">Заточка · распределение +N</h3><div class="table-wrap" id="balEnchant"></div></div>
            <div class="card"><h3 style="margin:0 0 8px;color:var(--gold);font-size:12px">Квесты · шаги</h3><div class="table-wrap" id="balQuests"></div></div>
            <div class="card"><h3 style="margin:0 0 8px;color:var(--gold);font-size:12px">Лут оружия</h3><div class="table-wrap" id="balLoot"></div></div>
          </section>

          <!-- ALERTS -->
          <section class="section" id="sec-alerts" hidden>
            <div class="card">
              <div class="filters">
                <div>
                  <label>Severity</label>
                  <select id="alSev">
                    <option value="">Все</option>
                    <option value="critical">critical</option>
                    <option value="warn">warn</option>
                    <option value="info">info</option>
                  </select>
                </div>
                <div>
                  <label>Период</label>
                  <select id="alPeriod">
                    <option value="7">7 дней</option>
                    <option value="30">30 дней</option>
                    <option value="90">90 дней</option>
                    <option value="0">Всё время</option>
                  </select>
                </div>
                <div>
                  <label>&nbsp;</label>
                  <button type="button" id="alApply">Фильтр</button>
                </div>
              </div>
            </div>
            <div class="table-wrap" id="alertsTable"></div>
            <div class="pager" id="alertsPager"></div>
          </section>

          <!-- EVENTS -->
          <section class="section" id="sec-events" hidden>
            <div class="card">
              <div class="filters">
                <div>
                  <label>Ник</label>
                  <input type="search" id="evNick" placeholder="nick…" />
                </div>
                <div>
                  <label>Тип события</label>
                  <select id="evType"><option value="">Все</option></select>
                </div>
                <div>
                  <label>characterId</label>
                  <input type="text" id="evChar" placeholder="c…" />
                </div>
                <div>
                  <label>С</label>
                  <input type="datetime-local" id="evSince" />
                </div>
                <div>
                  <label>По</label>
                  <input type="datetime-local" id="evUntil" />
                </div>
                <div>
                  <label>&nbsp;</label>
                  <button type="button" id="evApply">Фильтр</button>
                </div>
              </div>
              <div class="presets" id="evPresets">
                <button type="button" class="ghost sel" data-ev="">Все</button>
                <button type="button" class="ghost" data-ev="chat_">Чат*</button>
                <button type="button" class="ghost" data-ev="market_">Рынок*</button>
                <button type="button" class="ghost" data-ev="enchant_">Заточка*</button>
                <button type="button" class="ghost" data-ev="farm_session">Фарм</button>
                <button type="button" class="ghost" data-ev="login">Вход</button>
              </div>
            </div>
            <div class="table-wrap" id="eventsTable"></div>
            <div class="pager" id="eventsPager"></div>
          </section>

          <!-- BACKUPS -->
          <section class="section" id="sec-backups" hidden>
            <div class="card">
              <div class="filters">
                <div>
                  <label>Ник</label>
                  <input type="search" id="bkNick" placeholder="nick…" />
                </div>
                <div>
                  <label>characterId</label>
                  <input type="text" id="bkChar" placeholder="c…" />
                </div>
                <div>
                  <label>С</label>
                  <input type="datetime-local" id="bkSince" />
                </div>
                <div>
                  <label>По</label>
                  <input type="datetime-local" id="bkUntil" />
                </div>
                <div>
                  <label>&nbsp;</label>
                  <button type="button" id="bkApply">Фильтр</button>
                </div>
              </div>
            </div>
            <div class="table-wrap" id="backupsTable"></div>
            <div class="pager" id="backupsPager"></div>
          </section>

          <!-- SCORES -->
          <section class="section" id="sec-scores" hidden>
            <div class="card">
              <div class="filters">
                <div>
                  <label>Ник</label>
                  <input type="search" id="scNick" placeholder="nick…" />
                </div>
                <div>
                  <label>Сортировка</label>
                  <select id="scSort">
                    <option value="enchant">Заточка</option>
                    <option value="power">Сила</option>
                    <option value="wealth">Богатство</option>
                    <option value="mobs">Мобы</option>
                    <option value="adena">Adena</option>
                    <option value="updated">Обновлено</option>
                  </select>
                </div>
                <div>
                  <label>&nbsp;</label>
                  <button type="button" id="scApply">Фильтр</button>
                </div>
              </div>
            </div>
            <div class="table-wrap" id="scoresTable"></div>
            <div class="pager" id="scoresPager"></div>
          </section>
        </div>

        <aside class="detail" id="detail" hidden>
          <button type="button" class="ghost close" id="detailClose">Закрыть</button>
          <div id="detailBody"></div>
        </aside>
      </div>
    </div>
  </div>

  <script>
(function () {
  const KEY = "soulforge_db_admin_key";
  const $ = (id) => document.getElementById(id);
  const state = {
    tab: "users",
    users: { q: "", offset: 0, limit: 50 },
    chat: { channel: "", nick: "", text: "", offset: 0, limit: 80, latestId: 0 },
    market: { status: "", kind: "", nick: "", offset: 0, limit: 80 },
    events: { nick: "", event: "", characterId: "", since: null, until: null, offset: 0, limit: 100 },
    backups: { nick: "", characterId: "", since: null, until: null, offset: 0, limit: 50 },
    scores: { nick: "", sort: "enchant", offset: 0, limit: 100 },
    balance: { periodDays: 7 },
    alerts: { severity: "", periodDays: 7, offset: 0, limit: 50 },
    selectedUserId: null,
    live: true,
    liveTimer: null,
    busy: false,
  };

  const TAB_IDS = ["users", "chat", "market", "balance", "alerts", "events", "backups", "scores"];
  const LIVE_TABS = new Set(["chat", "events", "market", "alerts", "users"]);

  function markUpdated() {
    const el = $("updatedAt");
    if (el) el.textContent = "обновлено " + new Date().toLocaleTimeString("ru-RU");
  }

  function syncLiveUi() {
    const on = !!$("liveToggle")?.checked;
    state.live = on;
    const dot = $("liveDot");
    if (dot) dot.classList.toggle("on", on);
  }

  function stopLive() {
    if (state.liveTimer) {
      clearInterval(state.liveTimer);
      state.liveTimer = null;
    }
  }

  function startLive() {
    stopLive();
    syncLiveUi();
    if (!state.live) return;
    const ms = Math.max(2000, Number($("liveInterval")?.value) || 5000);
    state.liveTimer = setInterval(() => {
      if (document.hidden || state.busy) return;
      if (!LIVE_TABS.has(state.tab)) return;
      softRefresh();
    }, ms);
  }

  async function softRefresh() {
    if (state.busy) return;
    state.busy = true;
    try {
      await loadOverview(true);
      if (state.tab === "chat") await loadChat({ soft: true });
      else if (state.tab === "events") await loadEvents({ soft: true });
      else if (state.tab === "market") await loadMarket({ soft: true });
      else if (state.tab === "alerts") await loadAlerts();
      else if (state.tab === "users") await loadUsers();
      markUpdated();
    } finally {
      state.busy = false;
    }
  }

  function readKey() { try { return sessionStorage.getItem(KEY) || ""; } catch (e) { return ""; } }
  function writeKey(k) { try { if (k) sessionStorage.setItem(KEY, k); else sessionStorage.removeItem(KEY); } catch (e) {} }

  function headers(json) {
    const h = {};
    if (json) h["Content-Type"] = "application/json";
    const k = readKey();
    if (k) h["X-Soulforge-Admin"] = k;
    return h;
  }

  async function api(path, opts) {
    opts = opts || {};
    const res = await fetch(path, {
      method: opts.method || "GET",
      headers: headers(!!opts.json || opts.body != null),
      body: opts.body != null ? JSON.stringify(opts.body) : undefined,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) return { ok: false, status: res.status, error: data.error || "Ошибка" };
    return { ok: true, ...data };
  }

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
  }

  function fmtTs(ts) {
    if (!ts) return "—";
    try { return new Date(ts).toLocaleString("ru-RU"); } catch (e) { return String(ts); }
  }

  function fmtNum(n) {
    n = Number(n) || 0;
    try { return n.toLocaleString("ru-RU"); } catch (e) { return String(n); }
  }

  function dtLocalToMs(val) {
    if (!val) return null;
    const t = Date.parse(val);
    return Number.isFinite(t) ? t : null;
  }

  function qs(obj) {
    const p = new URLSearchParams();
    Object.keys(obj).forEach((k) => {
      const v = obj[k];
      if (v == null || v === "") return;
      p.set(k, String(v));
    });
    const s = p.toString();
    return s ? "?" + s : "";
  }

  function failAuth(r) {
    if (r && r.status === 401) {
      stopLive();
      writeKey("");
      $("gateMsg").textContent = r.error || "Неверный ключ";
      $("gateMsg").className = "msg err";
      $("gate").hidden = false;
      $("panel").hidden = true;
    }
  }

  function periodRange(days) {
    const until = Date.now();
    if (!days || days <= 0) return { since: 0, until };
    return { since: until - days * 86400000, until };
  }

  function setTab(tab) {
    state.tab = tab;
    document.querySelectorAll(".tab").forEach((b) => b.classList.toggle("sel", b.dataset.tab === tab));
    TAB_IDS.forEach((t) => {
      const el = $("sec-" + t);
      if (el) el.hidden = t !== tab;
    });
    startLive();
    refreshTab();
  }

  function renderPager(el, total, page) {
    const { offset, limit } = page;
    const from = total ? offset + 1 : 0;
    const to = Math.min(offset + limit, total);
    el.innerHTML =
      "<span>" + from + "–" + to + " из " + total + "</span>" +
      '<button type="button" class="ghost" data-page="prev"' + (offset <= 0 ? " disabled" : "") + ">←</button>" +
      '<button type="button" class="ghost" data-page="next"' + (offset + limit >= total ? " disabled" : "") + ">→</button>";
    el.querySelectorAll("[data-page]").forEach((btn) => {
      btn.onclick = () => {
        if (btn.dataset.page === "prev") page.offset = Math.max(0, page.offset - page.limit);
        else page.offset += page.limit;
        refreshTab();
      };
    });
  }

    if (!r.ok) return failAuth(r);
    const rows = r.rows || [];
    if (!rows.length) {
      $("scoresTable").innerHTML = '<p class="empty">Нет строк рейтинга</p>';
      renderPager($("scoresPager"), r.total || 0, p);
      return;
    }
    let html = "<table><thead><tr><th>Аккаунт</th><th>Герой</th><th>+</th><th>Сила</th><th>Earned</th><th>Adena</th><th>Мобы</th><th>Обновлено</th><th></th></tr></thead><tbody>";
    rows.forEach((s) => {
      html += '<tr class="clickable" data-user="' + s.userId + '">' +
        "<td><strong>" + esc(s.nick) + "</strong></td>" +
        "<td>" + esc(s.charName || "—") + "<br><small class='mono'>" + esc(s.characterId) + "</small></td>" +
        "<td>" + (s.maxPlus || 0) + "</td>" +
        "<td>" + fmtNum(s.farmPower) + "</td>" +
        "<td>" + fmtNum(s.earned) + "</td>" +
        "<td>" + fmtNum(s.adena) + "</td>" +
        "<td>" + fmtNum(s.mobs) + "</td>" +
        "<td><small>" + fmtTs(s.updatedAt) + "</small></td>" +
        '<td class="acts" onclick="event.stopPropagation()"><button type="button" data-open="' + s.userId + '">Открыть</button></td>' +
        "</tr>";
    });
    html += "</tbody></table>";
    $("scoresTable").innerHTML = html;
    $("scoresTable").querySelectorAll("[data-user]").forEach((tr) => {
      tr.onclick = () => openUser(Number(tr.dataset.user));
    });
    $("scoresTable").querySelectorAll("[data-open]").forEach((btn) => {
      btn.onclick = (e) => { e.stopPropagation(); openUser(Number(btn.dataset.open)); };
    });
    renderPager($("scoresPager"), r.total || 0, p);
  }

  async function openUser(userId) {
    state.selectedUserId = userId;
    const r = await api("/admin/users/" + userId);
    if (!r.ok) { failAuth(r); alert(r.error || "Ошибка"); return; }
    $("detail").hidden = false;
    $("layout").classList.add("has-detail");
    const u = r.user;
    const save = r.save;
    const lease = r.lease;
    let html = "<h2>" + esc(u.nick) + " <small class='muted'>#" + u.id + "</small></h2>";
    html += '<div class="kv">' +
      "<span>Создан</span><span>" + fmtTs(u.createdAt) + "</span>" +
      "<span>Сейв</span><span>" + (save ? "seq " + save.seq + " · " + fmtTs(save.savedAt) : "нет") + "</span>" +
      "<span>Зона</span><span>" + esc(save?.farmZone || "—") + "</span>" +
      "<span>Lease</span><span>" + (lease ? esc(lease.writerId) + " · до " + fmtTs(lease.expiresAt) : "—") + "</span>" +
      "</div>";

    html += "<h3>Персонажи (" + (r.characters || []).length + ")</h3>";
    if (!(r.characters || []).length) html += '<p class="muted">Нет слотов</p>';
    else {
      html += "<table><thead><tr><th>Имя</th><th>Ур</th><th>+</th><th>Сила</th><th>Adena</th></tr></thead><tbody>";
      (r.characters || []).forEach((c) => {
        html += "<tr><td>" + esc(c.charName || "—") + "<br><small class='mono'>" + esc(c.characterId) + "</small></td>" +
          "<td>" + (c.level || 1) + "</td><td>" + (c.maxPlus || 0) + "</td>" +
          "<td>" + fmtNum(c.farmPower) + "</td><td>" + fmtNum(c.adena) + "</td></tr>";
      });
      html += "</tbody></table>";
    }

    html += "<h3>Рейтинг (правка)</h3>";
    const scores = r.scores || [];
    if (!scores.length) {
      html += '<p class="muted">Нет строк scores — сохранение создаст для активного героя</p>';
      html += '<div class="row mt">' +
        '<input class="inp" id="dPlus" type="number" min="0" placeholder="+" value="0">' +
        '<input class="inp" id="dPower" type="number" min="0" placeholder="сила" value="0">' +
        '<input class="inp" id="dMobs" type="number" min="0" placeholder="мобы" value="0">' +
        '<input class="inp" id="dAdena" type="number" min="0" placeholder="adena" value="0">' +
        '<input class="inp" id="dEarned" type="number" min="0" placeholder="earned" value="0">' +
        '<button type="button" id="dScoreSave">Сохранить score</button></div>';
    } else {
      scores.forEach((s, i) => {
        html += '<div class="card" style="padding:8px;margin:6px 0">' +
          "<div><strong>" + esc(s.charName || s.characterId) + "</strong> <small class='mono'>" + esc(s.characterId) + "</small></div>" +
          '<div class="row mt">' +
          '<label>+</label><input class="inp" data-score="' + i + '" data-f="max_plus" type="number" min="0" value="' + (s.maxPlus || 0) + '">' +
          '<label>сила</label><input class="inp" data-score="' + i + '" data-f="farm_power" type="number" min="0" value="' + (s.farmPower || 0) + '">' +
          '<label>мобы</label><input class="inp" data-score="' + i + '" data-f="mobs" type="number" min="0" value="' + (s.mobs || 0) + '">' +
          '<label>adena</label><input class="inp" data-score="' + i + '" data-f="adena" type="number" min="0" value="' + (s.adena || 0) + '">' +
          '<label>earned</label><input class="inp" data-score="' + i + '" data-f="earned" type="number" min="0" value="' + (s.earned || 0) + '">' +
          '<button type="button" data-save-score="' + i + '" data-cid="' + esc(s.characterId) + '">Save</button>' +
          "</div></div>";
      });
    }

    html += "<h3>Бэкапы (" + (r.backups || []).length + ")</h3>";
    if (!(r.backups || []).length) html += '<p class="muted">Пока нет</p>';
    else {
      html += "<table><thead><tr><th>#</th><th>Герой</th><th>Когда</th><th></th></tr></thead><tbody>";
      (r.backups || []).forEach((b) => {
        html += "<tr><td>" + b.id + "</td><td>" + esc(b.charName || b.characterId) +
          "<br><small>ур." + b.level + " · " + fmtNum(b.adena) + "</small></td>" +
          "<td><small>" + fmtTs(b.createdAt) + "</small></td>" +
          '<td class="acts"><button type="button" class="ok" data-restore="' + userId + '" data-bid="' + b.id + '">Restore</button>' +
          '<button type="button" class="ghost" data-view="' + userId + '" data-bid="' + b.id + '">JSON</button></td></tr>';
      });
      html += "</tbody></table>";
    }

    html += "<h3>События (" + (r.events || []).length + ")</h3>";
    if (!(r.events || []).length) html += '<p class="muted">Пока нет</p>';
    else {
      html += "<table><thead><tr><th>Когда</th><th>Тип</th><th>Детали</th></tr></thead><tbody>";
      (r.events || []).slice(0, 40).forEach((e) => {
        const payload = e.payload ? JSON.stringify(e.payload) : "";
        html += "<tr><td><small>" + fmtTs(e.createdAt) + "</small></td>" +
          '<td><span class="pill evt">' + esc(e.event) + "</span></td>" +
          "<td><small>" + esc(e.charName || e.characterId || "") + "</small>" +
          (payload ? '<div class="payload">' + esc(payload) + "</div>" : "") + "</td></tr>";
      });
      html += "</tbody></table>";
    }

    html += '<div class="row mt"><button type="button" class="ghost" id="dFilterEv">События этого ника</button>' +
      '<button type="button" class="ghost" id="dFilterBk">Бэкапы этого ника</button>' +
      '<button type="button" class="ghost" id="dFilterChat">Чат этого ника</button></div>';

    $("detailBody").innerHTML = html;
    $("detailBody").querySelectorAll("[data-save-score]").forEach((btn) => {
      btn.onclick = async () => {
        const i = btn.dataset.saveScore;
        const body = { character_id: btn.dataset.cid };
        $("detailBody").querySelectorAll('[data-score="' + i + '"]').forEach((inp) => {
          body[inp.dataset.f] = Number(inp.value) || 0;
        });
        const saveR = await api("/admin/users/" + userId + "/score", { method: "PUT", body });
        if (saveR.ok) { alert("Score сохранён"); openUser(userId); }
        else alert(saveR.error || "Ошибка");
      };
    });
    const dScoreSave = $("dScoreSave");
    if (dScoreSave) {
      dScoreSave.onclick = async () => {
        const body = {
          max_plus: Number($("dPlus").value) || 0,
          farm_power: Number($("dPower").value) || 0,
          mobs: Number($("dMobs").value) || 0,
          adena: Number($("dAdena").value) || 0,
          earned: Number($("dEarned").value) || 0,
        };
        const saveR = await api("/admin/users/" + userId + "/score", { method: "PUT", body });
        if (saveR.ok) { alert("Score сохранён"); openUser(userId); }
        else alert(saveR.error || "Ошибка");
      };
    }
    $("detailBody").querySelectorAll("[data-restore]").forEach((btn) => {
      btn.onclick = () => restoreBackup(Number(btn.dataset.restore), Number(btn.dataset.bid));
    });
    $("detailBody").querySelectorAll("[data-view]").forEach((btn) => {
      btn.onclick = () => viewBackup(Number(btn.dataset.view), Number(btn.dataset.bid));
    });
    const fe = $("dFilterEv");
    if (fe) fe.onclick = () => {
      $("evNick").value = u.nick;
      state.events.offset = 0;
      setTab("events");
    };
    const fb = $("dFilterBk");
    if (fb) fb.onclick = () => {
      $("bkNick").value = u.nick;
      state.backups.offset = 0;
      setTab("backups");
    };
    const fc = $("dFilterChat");
    if (fc) fc.onclick = () => {
      if ($("chatNick")) $("chatNick").value = u.nick;
      state.chat.offset = 0;
      setTab("chat");
    };
  }

  function closeDetail() {
    state.selectedUserId = null;
    $("detail").hidden = true;
    $("layout").classList.remove("has-detail");
    $("detailBody").innerHTML = "";
  }

  async function restoreBackup(userId, backupId, name) {
    if (!confirm("Восстановить персонажа" + (name ? " «" + name + "»" : "") + " из бэкапа #" + backupId + "?\nИгрок получит этот progress при следующей синхронизации.")) return;
    const r = await api("/admin/users/" + userId + "/backups/" + backupId + "/restore", { method: "POST", body: {} });
    if (r.ok) {
      alert("OK · seq=" + r.seq + " · " + (r.characterId || ""));
      if (state.selectedUserId === userId) openUser(userId);
      if (state.tab === "backups") loadBackups();
    } else alert(r.error || "Ошибка");
  }

  async function viewBackup(userId, backupId) {
    const r = await api("/admin/users/" + userId + "/backups/" + backupId);
    if (!r.ok) { alert(r.error || "Ошибка"); return; }
    const w = window.open("", "_blank", "width=720,height=800");
    if (!w) { alert(JSON.stringify(r.backup, null, 2)); return; }
    w.document.write("<pre style='background:#111;color:#ddd;padding:12px;font:12px monospace'>" +
      esc(JSON.stringify(r.backup, null, 2)) + "</pre>");
  }

  function refreshTab() {
    if (state.tab === "users") loadUsers();
    else if (state.tab === "chat") loadChat();
    else if (state.tab === "market") loadMarket();
    else if (state.tab === "balance") loadBalance();
    else if (state.tab === "alerts") loadAlerts();
    else if (state.tab === "events") loadEvents();
    else if (state.tab === "backups") loadBackups();
    else if (state.tab === "scores") loadScores();
  }

  async function loadPanel() {
    await loadOverview();
    $("gate").hidden = true;
    $("panel").hidden = false;
    await loadEventTypes();
    startLive();
    refreshTab();
  }

  $("unlockBtn").onclick = async () => {
    writeKey(($("adminKey").value || "").trim());
    $("gateMsg").textContent = "";
    const en = await api("/admin/enabled");
    if (!en.ok || !en.enabled) {
      $("gateMsg").textContent = "Админка отключена на сервере";
      $("gateMsg").className = "msg err";
      return;
    }
    const test = await api("/admin/overview");
    if (!test.ok) {
      $("gateMsg").textContent = test.error || "Неверный ключ";
      $("gateMsg").className = "msg err";
      writeKey("");
      return;
    }
    await loadPanel();
  };
  $("adminKey").addEventListener("keydown", (e) => { if (e.key === "Enter") $("unlockBtn").click(); });
  $("logoutBtn").onclick = () => {
    stopLive();
    writeKey("");
    $("adminKey").value = "";
    closeDetail();
    $("gate").hidden = false;
    $("panel").hidden = true;
  };
  $("refreshBtn").onclick = () => { loadOverview(); refreshTab(); if (state.selectedUserId) openUser(state.selectedUserId); };
  $("purgeBtn").onclick = async () => {
    const r = await api("/admin/maintenance/purge-sessions", { method: "POST", body: {} });
    if (r.ok) { alert("Удалено сессий: " + (r.removed || 0)); loadOverview(); }
    else alert(r.error || "Ошибка");
  };
  $("detailClose").onclick = closeDetail;

  if ($("liveToggle")) {
    $("liveToggle").onchange = () => startLive();
  }
  if ($("liveInterval")) {
    $("liveInterval").onchange = () => startLive();
  }
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && state.live && !$("panel").hidden) softRefresh();
  });

  document.querySelectorAll(".tab").forEach((btn) => {
    btn.onclick = () => setTab(btn.dataset.tab);
  });
  $("usersApply").onclick = () => { state.users.offset = 0; loadUsers(); };
  $("usersQ").addEventListener("keydown", (e) => { if (e.key === "Enter") $("usersApply").click(); });

  function wireChatFilters() {
    if (!$("chatApply")) return;
    $("chatApply").onclick = () => { state.chat.offset = 0; loadChat(); };
    ["chatNick", "chatText"].forEach((id) => {
      const el = $(id);
      if (!el) return;
      el.addEventListener("keydown", (e) => { if (e.key === "Enter") $("chatApply").click(); });
    });
    if ($("chatChannel")) $("chatChannel").onchange = () => { state.chat.offset = 0; loadChat(); };
    document.querySelectorAll("#chatPresets [data-ch]").forEach((btn) => {
      btn.onclick = () => {
        document.querySelectorAll("#chatPresets [data-ch]").forEach((b) => b.classList.toggle("sel", b === btn));
        $("chatChannel").value = btn.dataset.ch || "";
        state.chat.offset = 0;
        loadChat();
      };
    });
  }
  wireChatFilters();

  function wireMarketFilters() {
    if (!$("mkApply")) return;
    $("mkApply").onclick = () => { state.market.offset = 0; loadMarket(); };
    if ($("mkNick")) $("mkNick").addEventListener("keydown", (e) => { if (e.key === "Enter") $("mkApply").click(); });
    ["mkStatus", "mkKind"].forEach((id) => {
      const el = $(id);
      if (el) el.onchange = () => { state.market.offset = 0; loadMarket(); };
    });
  }
  wireMarketFilters();

  function setEventPreset(ev) {
    const sel = $("evType");
    if (ev && sel && ![...sel.options].some((o) => o.value === ev)) {
      const opt = document.createElement("option");
      opt.value = ev;
      opt.textContent = ev + " (пресет)";
      sel.appendChild(opt);
    }
    if (sel) sel.value = ev || "";
    document.querySelectorAll("#evPresets [data-ev]").forEach((b) => {
      b.classList.toggle("sel", (b.dataset.ev || "") === (ev || ""));
    });
    state.events.offset = 0;
    loadEvents();
  }
  document.querySelectorAll("#evPresets [data-ev]").forEach((btn) => {
    btn.onclick = () => setEventPreset(btn.dataset.ev || "");
  });

  $("evApply").onclick = () => { state.events.offset = 0; loadEvents(); };
  $("bkApply").onclick = () => { state.backups.offset = 0; loadBackups(); };
  $("scApply").onclick = () => { state.scores.offset = 0; loadScores(); };
  $("balApply").onclick = () => loadBalance();
  $("alApply").onclick = () => { state.alerts.offset = 0; loadAlerts(); };
  document.querySelectorAll("[data-csv]").forEach((btn) => {
    btn.onclick = () => downloadCsv(btn.dataset.csv);
  });

  (async function boot() {
    const en = await api("/admin/enabled");
    if (!en.ok || !en.enabled) {
      $("gateMsg").textContent = "Админка отключена: задайте SOULFORGE_ADMIN_KEY на сервере.";
      $("gateMsg").className = "msg err";
      $("unlockBtn").disabled = true;
      return;
    }
    if (readKey()) {
      $("adminKey").value = readKey();
      const test = await api("/admin/overview");
      if (test.ok) await loadPanel();
      else writeKey("");
    }
  })();
})();
  </script>
</body>
</html>
